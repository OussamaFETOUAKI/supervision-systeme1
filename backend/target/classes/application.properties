# ========================================
# Smart City Backend - Persistent Config
# ========================================

spring.application.name=smart-city-backend

# --- H2 Database (Persistent File Mode) ---
# This will create a file named 'smartcity_data.mv.db' in your project root
spring.datasource.url=jdbc:h2:file:./smartcity_data;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'update' keeps existing data and only modifies structure if needed
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- H2 Console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Gemini AI Configuration ---
# Use 'setx GEMINI_API_KEY "your_key"' in windows to set the environment variable
ai.gemini.secret=AIzaSyDWidH43X0C5uCMoQq6Iow7CV-qOtUOmOw
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# --- Server Port and Limits ---
server.port=8080
server.max-http-header-size=64KB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
